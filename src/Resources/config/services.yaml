services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  MwuSdk\:
    resource: '../../'
    exclude:
      - '../../DependencyInjection/'
      - '../../Resources/'
      - '../../Entity/'
      - '../../Model'
      - '../../Enum'
      - '../../Builder'
      - '../../Dto'
      - '../../Exception'
      - '../../MwuSdkBundle.php'

  MwuSdk\Client\:
    resource: '../../Client/'
    exclude:
      - '../../Client/MwuLightModule'
      - '../../Client/MwuSwitch'
      - '../../Client/TcpIp'
